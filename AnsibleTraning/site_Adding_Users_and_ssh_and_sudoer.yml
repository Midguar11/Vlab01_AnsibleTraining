 - hosts: all
   become: true
   pre_tasks:

   - name: install updates (CentOS)
     tags: always 
     dnf:
       update_only: yes
       update_cache: yes
     when: ansible_distribution == "CentOS"

   - name: install updates (Ubuntu)
     tags: always 
     apt:
       upgrade: dist
       update_cache: yes
     when: ansible_distribution == "Ubuntu"

#Create user
 - hosts: all
   become: true
   tasks:

   - name: create user 
     tags: always
     user:
       name: simone
       groups: root #Add root grp

# Add ssh for user
   - name: add ssh key for simone
     tags: always
     authorized_key:
       user: simone
       #ssh key copy, cheking actual: ls -la ~/.ssh/ and use: cat ~/.ssh/xyyyy
       key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIWn3u5u7o9vLk3eF0mp5y76gqWxu/B/T xcxOXX+xPCW Vlab01 default" 
         
 #user can use sudo command ,it doesn't need passworld        
   - name: add sudoers file for simone
     tags: always
     copy:
       src: sudoer_simone
       dest: /etc/sudoers.d/simone
       owner: root
       group: root
       mode: 0440    
 
 - hosts: workstations
   become: true
   tasks:

   - name: install unzip
     package:
       name: unzip
 
   - name: install terraform
     unarchive:
      src: https://releases.hashicorp.com/terraform/1.1.7/terraform_1.1.7_linux_amd64.zip
      dest: /usr/local/bin
      remote_src: yes
      mode: 0755
      owner: root
      group: root

 - hosts: web_servers
   become: true
   tasks:

   - name: install httpd package (CentOS)
     tags: apache,centos,httpd
     dnf:
       name:
         - httpd
         - php
       state: latest
     when: ansible_distribution == "CentOS"

   - name: install apache2 package (Ubuntu)
     tags: apache,apache2,ubuntu
     apt:
       name:
         - apache2
         - libapache2-mod-php
       state: latest
     when: ansible_distribution == "Ubuntu"
     
   - name: copy html file for site
     tags: apache,apache,apache2,httpd
     copy:
       src: default_site.html
       dest: /var/www/html/index.html
       owner: root
       group: root
       mode: 0644  

 - hosts: db_servers
   become: true
   tasks:

   - name: install mariadb server package (CentOS)
     tags: centos,db,mariadb
     dnf:
       name: mariadb
       state: latest
     when: ansible_distribution == "CentOS"

   - name: install mariadb server (Ubuntu)
     tags: centos,db,mariadb
     apt:
       name: mariadb-server
       state: latest
     when: ansible_distribution == "Ubuntu"

 - hosts: file_servers
   tags: samba
   become: true
   tasks:

   - name: install samba package
     tags: samba
     package:
       name: samba
       state: latest


